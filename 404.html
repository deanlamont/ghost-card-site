<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Ghost Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0D1426;color:#E8EDF6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden}
  .sky{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0D1C38 0%,#080F22 55%,#040A18 100%);z-index:0}
  #sc{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
  .trees{position:fixed;bottom:0;left:0;right:0;z-index:2;pointer-events:none}
  .content{position:relative;z-index:5;max-width:560px;padding-bottom:140px}
  svg{animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(240,232,208,0.28));margin-bottom:24px}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .label{font-size:11px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:#C9A84C;margin-bottom:16px}
  .headline{font-size:clamp(34px,7vw,72px);font-weight:200;letter-spacing:2px;line-height:1.1;color:#E8EDF6;margin-bottom:12px}
  .headline em{font-style:normal;color:#C9A84C}
  .sub{font-size:16px;color:#8FA4C4;line-height:1.65;margin-bottom:10px}
  .punchline{font-size:13px;color:#546082;font-style:italic;margin-bottom:36px}
  .btn{display:inline-block;background:#CF9120;color:#0D1426;padding:13px 30px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .2s}
  .btn:hover{background:#C9A84C;transform:translateY(-1px)}
  .wm{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Inter',sans-serif;font-weight:200;font-size:11px;letter-spacing:5px;display:flex;z-index:6;opacity:.3}
</style>
</head>
<body>
  <div class="sky"></div>
  <canvas id="sc"></canvas>
  <div class="trees">
    <svg viewBox="0 0 390 240" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:240px;display:block;">
      <defs>
        <linearGradient id="gcGroundGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#060C18"/>
          <stop offset="100%" stop-color="#030710"/>
        </linearGradient>
      </defs>
      <!-- Layer 1: farthest back -->
      <g fill="#0B1A2E" opacity="0.55">
        <polygon points="0,160 14,140 28,160"/>
        <polygon points="20,160 36,133 52,160"/>
        <polygon points="45,160 58,143 71,160"/>
        <polygon points="68,160 82,136 96,160"/>
        <polygon points="110,160 124,138 138,160"/>
        <polygon points="130,160 146,130 162,160"/>
        <polygon points="195,160 210,135 225,160"/>
        <polygon points="218,160 232,142 246,160"/>
        <polygon points="290,160 305,133 320,160"/>
        <polygon points="312,160 327,139 342,160"/>
        <polygon points="355,160 370,137 385,160"/>
        <polygon points="372,160 385,144 405,160"/>
      </g>
      <!-- Layer 2: mid depth -->
      <g fill="#081422" opacity="0.82">
        <polygon points="-5,160 12,126 29,160"/>
        <polygon points="18,160 38,116 58,160"/>
        <polygon points="50,160 66,128 82,160"/>
        <polygon points="88,160 104,122 120,160"/>
        <polygon points="148,160 163,130 178,160"/>
        <polygon points="170,160 186,120 202,160"/>
        <polygon points="238,160 252,126 266,160"/>
        <polygon points="258,160 273,116 288,160"/>
        <polygon points="330,160 345,123 360,160"/>
        <polygon points="352,160 368,118 384,160"/>
        <polygon points="375,160 390,128 405,160"/>
        <rect x="36" y="148" width="4" height="12" fill="#060E1A"/>
        <rect x="102" y="148" width="4" height="12" fill="#060E1A"/>
        <rect x="183" y="148" width="4" height="12" fill="#060E1A"/>
        <rect x="270" y="148" width="4" height="12" fill="#060E1A"/>
        <rect x="363" y="148" width="4" height="12" fill="#060E1A"/>
      </g>
      <!-- Layer 3: foreground, darkest -->
      <g fill="#040C18">
        <polygon points="-8,160 16,88 40,160"/>
        <polygon points="28,160 52,96 76,160"/>
        <polygon points="62,160 84,104 106,160"/>
        <polygon points="96,160 115,98 134,160"/>
        <polygon points="128,160 145,108 162,160"/>
        <polygon points="158,160 174,94 190,160"/>
        <polygon points="198,160 216,86 234,160"/>
        <polygon points="228,160 248,100 268,160"/>
        <polygon points="275,160 294,88 313,160"/>
        <polygon points="305,160 325,96 345,160"/>
        <polygon points="338,160 356,104 374,160"/>
        <polygon points="368,160 386,91 404,160"/>
        <rect x="13" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="49" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="81" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="112" y="144" width="5" height="16" fill="#030A14"/>
        <rect x="142" y="144" width="5" height="16" fill="#030A14"/>
        <rect x="171" y="144" width="5" height="16" fill="#030A14"/>
        <rect x="213" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="245" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="291" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="322" y="144" width="6" height="16" fill="#030A14"/>
        <rect x="354" y="144" width="5" height="16" fill="#030A14"/>
        <rect x="383" y="144" width="5" height="16" fill="#030A14"/>
      </g>
      <!-- Ground fill -->
      <rect x="0" y="160" width="390" height="80" fill="url(#gcGroundGrad)"/>
    </svg>
  </div>
  <div class="content">
    <svg viewBox="0 0 20 22.4" width="80" height="90" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 1.5 C5.3 1.5, 2 5.2, 2 9.8 L2 19 Q4.2 21.2, 6.3 19 Q8.4 16.8, 10 19 Q11.6 21.2, 13.7 19 Q15.8 16.8, 18 19 L18 9.8 C18 5.2, 14.7 1.5, 10 1.5 Z" fill="#F0E8D0"/>
      <ellipse cx="7.4" cy="10.5" rx="1.7" ry="2.1" fill="rgba(0,0,0,0.45)"/>
      <ellipse cx="12.6" cy="10.5" rx="1.7" ry="2.1" fill="rgba(0,0,0,0.45)"/>
    </svg>
    <p class="label">404 — Disc Not Found</p>
    <h1 class="headline">You threw it<br>into the <em>woods.</em></h1>
    <p class="sub">This page doesn't exist. It's somewhere in the ravine on hole 7 with your Innova Star Destroyer and your will to birdie.</p>
    <p class="punchline">The group of nine blocking hole 3 saw it happen. They're not going to say anything.</p>
    <a href="index.html" class="btn">Take a Drop. Go Home.</a>
  </div>
  <div class="wm"><span style="color:#EDE9DC">GHOST</span><span style="color:#CF9120">CARD</span></div>
<script>
(function(){
  const c=document.getElementById('sc'),ctx=c.getContext('2d');
  let W,H,stars=[],shoots=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  function init(){stars=[];const n=Math.floor(W*H/3000);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*(H*.75),r:Math.random()*1.1+.15,a:Math.random()*.65+.2,ts:Math.random()*.018+.004,to:Math.random()*Math.PI*2});}
  function spawn(){const a=Math.PI/4+(Math.random()-.5)*.45,s=9+Math.random()*9;shoots.push({x:Math.random()*W*.85+W*.05,y:Math.random()*(H*.38),vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,trail:[],dead:false});}
  function draw(ts){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{const tw=s.a*(.55+.45*Math.sin(ts*s.ts+s.to));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(232,237,246,${tw})`;ctx.fill();});
    shoots.forEach(ss=>{
      if(ss.dead)return;
      ss.trail.push({x:ss.x,y:ss.y,a:ss.alpha});if(ss.trail.length>22)ss.trail.shift();
      for(let i=0;i<ss.trail.length-1;i++){const p0=ss.trail[i],p1=ss.trail[i+1],f=(i+1)/ss.trail.length;ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.strokeStyle=`rgba(240,236,200,${p0.a*f*.75})`;ctx.lineWidth=f*2.2;ctx.lineCap='round';ctx.stroke();}
      const g=ctx.createRadialGradient(ss.x,ss.y,0,ss.x,ss.y,3.5);g.addColorStop(0,`rgba(245,240,210,${ss.alpha})`);g.addColorStop(1,'rgba(240,236,200,0)');ctx.beginPath();ctx.arc(ss.x,ss.y,3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ss.x+=ss.vx;ss.y+=ss.vy;ss.alpha-=.022;if(ss.alpha<=0||ss.x>W+200||ss.y>H+200)ss.dead=true;
    });
    shoots=shoots.filter(s=>!s.dead);
  }
  let last=0,ni=3000+Math.random()*4000;
  function loop(ts){draw(ts);if(ts-last>ni){spawn();last=ts;ni=2500+Math.random()*4500;}requestAnimationFrame(loop);}
  window.addEventListener('resize',()=>{resize();init();});
  resize();init();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
