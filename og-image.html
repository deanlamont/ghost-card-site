<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=block');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif;background:#040A18}
</style>
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="48%" r="75%">
      <stop offset="0%" stop-color="#0D1C38"/>
      <stop offset="55%" stop-color="#080F22"/>
      <stop offset="100%" stop-color="#040A18"/>
    </radialGradient>
  </defs>

  <!-- SKY -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- STARS — cream, distributed across the whole canvas -->
  <g fill="#E8EDF6">
    <circle cx="48"   cy="52"  r="2.8" opacity=".48"/>
    <circle cx="142"  cy="22"  r="3.4" opacity=".52"/>
    <circle cx="96"   cy="128" r="3.8" opacity=".60"/>
    <circle cx="268"  cy="64"  r="2.6" opacity=".44"/>
    <circle cx="192"  cy="182" r="2.4" opacity=".40"/>
    <circle cx="325"  cy="212" r="3.0" opacity=".46"/>
    <circle cx="400"  cy="18"  r="3.7" opacity=".58"/>
    <circle cx="462"  cy="44"  r="5.0" opacity=".78"/>
    <circle cx="535"  cy="55"  r="2.9" opacity=".46"/>
    <circle cx="610"  cy="12"  r="3.4" opacity=".54"/>
    <circle cx="745"  cy="42"  r="2.7" opacity=".42"/>
    <circle cx="810"  cy="95"  r="3.2" opacity=".40"/>
    <circle cx="905"  cy="32"  r="4.8" opacity=".72"/>
    <circle cx="1018" cy="66"  r="3.6" opacity=".56"/>
    <circle cx="1100" cy="20"  r="3.4" opacity=".54"/>
    <circle cx="1148" cy="90"  r="2.8" opacity=".44"/>
    <circle cx="60"   cy="300" r="2.4" opacity=".40"/>
    <circle cx="155"  cy="430" r="2.8" opacity=".44"/>
    <circle cx="85"   cy="520" r="3.0" opacity=".48"/>
    <circle cx="250"  cy="492" r="2.6" opacity=".42"/>
    <circle cx="380"  cy="558" r="3.2" opacity=".52"/>
    <circle cx="1045" cy="420" r="2.8" opacity=".44"/>
    <circle cx="1125" cy="510" r="3.4" opacity=".56"/>
    <circle cx="965"  cy="558" r="2.6" opacity=".42"/>
    <circle cx="1168" cy="360" r="2.9" opacity=".46"/>
    <circle cx="830"  cy="548" r="2.5" opacity=".40"/>
    <circle cx="42"   cy="418" r="2.7" opacity=".42"/>
    <circle cx="186"  cy="335" r="3.3" opacity=".50"/>
    <circle cx="1078" cy="282" r="2.8" opacity=".44"/>
    <circle cx="955"  cy="222" r="3.4" opacity=".56"/>
    <circle cx="715"  cy="575" r="2.6" opacity=".42"/>
    <circle cx="520"  cy="592" r="2.4" opacity=".38"/>
  </g>

  <!-- STARS — gold accents -->
  <g fill="#C9A84C">
    <circle cx="194"  cy="38"  r="5.0" opacity=".76"/>
    <circle cx="635"  cy="20"  r="4.8" opacity=".68"/>
    <circle cx="1080" cy="135" r="3.6" opacity=".62"/>
    <circle cx="275"  cy="580" r="3.4" opacity=".58"/>
    <circle cx="995"  cy="495" r="3.2" opacity=".56"/>
  </g>

  <!-- GHOST ICON — centered, with breathing room above wordmark -->
  <g transform="translate(516,60) scale(8.4)">
    <path d="M10 1.5 C5.3 1.5, 2 5.2, 2 9.8 L2 19 Q4.2 21.2, 6.3 19 Q8.4 16.8, 10 19 Q11.6 21.2, 13.7 19 Q15.8 16.8, 18 19 L18 9.8 C18 5.2, 14.7 1.5, 10 1.5 Z" fill="#F0E8D0"/>

    <ellipse cx="12.6" cy="10.5" rx="1.7" ry="2.1" fill="rgba(0,0,0,0.45)"/>
  </g>

  <!-- WORDMARK — one <text>, two <tspan>s. Lays out sequentially, cannot collide. -->
  <text x="600" y="408"
    font-family="Inter, system-ui, sans-serif"
    font-weight="200"
    font-size="92"
    letter-spacing="12"
    text-anchor="middle"><tspan fill="#EDE9DC">GHOST</tspan><tspan fill="#CF9120">CARD</tspan></text>

  <!-- TAGLINE -->
  <text x="600" y="470"
    font-family="Inter, system-ui, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="7"
    fill="#CF9120"
    text-anchor="middle">REAL DISC GOLF. VIDEO GAME SOUL.</text>
</svg>
</body>
</html>
