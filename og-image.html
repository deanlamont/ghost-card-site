<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>

  body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif;background:#040A18}
</style>

  <defs>
    <!-- Sky -->
    <radialGradient id="sky" cx="72%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#0D1C38"/>
      <stop offset="45%" stop-color="#080F22"/>
      <stop offset="100%" stop-color="#040A18"/>
    </radialGradient>
    <!-- Moon halos -->
    <radialGradient id="halo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EDE8C0" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#EDE8C0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#EDE8C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0ECC8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F0ECC8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonBody" cx="38%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#FEFBE8"/>
      <stop offset="55%" stop-color="#EEEAC2"/>
      <stop offset="100%" stop-color="#D8D4A4"/>
    </radialGradient>
    <!-- Ground -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#030710"/>
    </linearGradient>
    <!-- Gold glow under logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom vignette -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040A18" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040A18" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- WORDMARK -->
  <text x="600" y="358"
    font-family="Inter, system-ui, sans-serif"
    font-weight="200"
    font-size="72"
    letter-spacing="19"
    fill="#EDE9DC"

    font-family="Inter, system-ui, sans-serif"
    font-weight="200"
    font-size="72"

    font-family="Inter, system-ui, sans-serif"
